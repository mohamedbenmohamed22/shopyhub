services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pow
      POSTGRES_PASSWORD: pow
      POSTGRES_DB: product_of_the_week
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pow -d product_of_the_week"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Object storage for product images (S3-compatible).
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "${MINIO_API_PORT}:9000"      # S3 API
      - "${MINIO_CONSOLE_PORT}:9001"  # web console
    volumes:
      - pow_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: create the bucket and make it publicly readable so image URLs work.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY} &&
      mc mb --ignore-existing local/$${S3_BUCKET} &&
      mc anonymous set download local/$${S3_BUCKET} &&
      echo 'bucket $${S3_BUCKET} ready';
      "
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
    restart: "no"

  # NestJS API. Builds the same image used in production; only the env differs.
  # Talks to db/minio over the compose network (service names, not localhost).
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: potw-backend:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      # Internal network endpoints (NOT the host-published ports).
      DATABASE_URL: postgresql://pow:pow@db:5432/product_of_the_week?schema=public
      PORT: "3000"
      API_PREFIX: api/v1
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRES_IN: "1d"
      DEFAULT_DELIVERY_FEE: "7"
      # Seed admin (used only if you run the seed script).
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@potw.tn}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin1234}
      # MinIO over the compose network for uploads…
      S3_ENDPOINT: minio
      S3_PORT: "9000"
      S3_USE_SSL: "false"
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-us-east-1}
      # …but image URLs must be reachable from the browser (host-published port).
      S3_PUBLIC_URL: http://localhost:${MINIO_API_PORT}/${S3_BUCKET}

volumes:
  pow_pgdata:
  pow_minio:
