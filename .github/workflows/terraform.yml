name: Terraform

on:
  pull_request:
    branches: [main]
    paths: ["terraform/**"]
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        type: choice
        options: [plan, apply, destroy]
        default: plan

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # assume the AWS role via OIDC
  pull-requests: write

defaults:
  run:
    working-directory: terraform

jobs:
  # Format + validate without credentials — runs on every PR.
  validate:
    name: fmt & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6
      - name: Format check
        run: terraform fmt -check -recursive
      - name: Init (no backend)
        run: terraform init -backend=false
      - name: Validate
        run: terraform validate

  # Plan / apply against the real account. Requires the secrets below.
  apply:
    name: ${{ github.event.inputs.action }}
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'destroy'
    runs-on: ubuntu-latest
    environment: prod
    env:
      TF_VAR_db_password: ${{ secrets.DATABASE_PASSWORD }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD }}
      TF_VAR_github_repo: ${{ github.repository }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
            aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6
      - run: terraform init
      - name: Plan
        run: terraform plan -out=tfplan
      - name: Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Sync Outputs to S3
        if: github.event.inputs.action == 'apply'
        run: |
          terraform output -json > outputs.json
          aws s3 cp outputs.json s3://potw-tfstate-121546003208/prod/outputs.json

  destroy:
    name: Destroy infrastructure
    if: github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest
    environment: prod
    env:
      TF_VAR_db_password: ${{ secrets.DATABASE_PASSWORD }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD }}
      TF_VAR_github_repo: ${{ github.repository }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
            aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6
      - run: terraform init
      - run: terraform destroy -auto-approve
