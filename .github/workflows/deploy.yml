name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC -> assume the AWS deploy role

jobs:
  # Build + push the backend image, then redeploy it on the instance via SSM.
  backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.BACKEND_ARN_DEPLOY }}
          aws-region: "eu-north-1"

      - name: Load Terraform Outputs from S3
        run: |
          set -euo pipefail
          aws s3 cp s3://potw-tfstate-121546003208/prod/outputs.json - > /tmp/outputs.json

          cat /tmp/outputs.json
          jq -r 'to_entries | .[] | "\(.key|ascii_upcase)=\(.value)"' /tmp/outputs.json >> $GITHUB_ENV

      - name: Debug ECR variable
        run: |
          echo "ECR_REPOSITORY_URL=[$ECR_REPOSITORY_URL]"
          echo "IMAGE_TAG=[$IMAGE_TAG]"

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # ECR_REPOSITORY_URL is loaded from S3
          docker build -t "$ECR_REPOSITORY_URL:$IMAGE_TAG" -t "$ECR_REPOSITORY_URL:latest" ./backend
          docker push "$ECR_REPOSITORY_URL:$IMAGE_TAG"
          docker push "$ECR_REPOSITORY_URL:latest"

      - name: Trigger rolling deploy via SSM
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # BACKEND_INSTANCE_ID is loaded from S3
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$BACKEND_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy $IMAGE_TAG" \
            --parameters commands="sudo /usr/local/bin/deploy-backend.sh $IMAGE_TAG" \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CMD_ID"
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$BACKEND_INSTANCE_ID" || true
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$BACKEND_INSTANCE_ID" \
            --query "{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}" --output json

  # Build the frontend against the CDN API URL, sync to S3, invalidate CloudFront.
  frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEPLOY_FRONT_ARN }}
          aws-region: "eu-north-1"

      - name: Load Terraform Outputs from S3
        run: |
          # aws s3 cp s3://potw-tfstate-121546003208/prod/outputs.json - | \
          # jq -r 'to_entries | .[] | "\(.key|ascii_upcase)=\(.value)"' >> $GITHUB_ENV

          set -euo pipefail
          aws s3 cp s3://potw-tfstate-121546003208/prod/outputs.json - > /tmp/outputs.json

          cat /tmp/outputs.json
          jq -r 'to_entries | .[] | "\(.key|ascii_upcase)=\(.value)"' /tmp/outputs.json >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - name: Build
        run: |
          # API_BASE_URL is loaded from S3
          VITE_API_URL="$API_BASE_URL" npm run build

      - name: Sync to S3
        run: |
          # FRONTEND_BUCKET is loaded from S3
          aws s3 sync dist "s3://$FRONTEND_BUCKET" --delete

      - name: Invalidate CloudFront
        run: |
          # CLOUDFRONT_DISTRIBUTION_ID is loaded from S3
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
