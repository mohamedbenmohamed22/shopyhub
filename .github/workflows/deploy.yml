name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC -> assume the AWS deploy role

jobs:
  # Build + push the backend image, then redeploy it on the instance via SSM.
  backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image
        env:
          ECR_REPO: ${{ vars.ECR_REPOSITORY_URL }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REPO:$IMAGE_TAG" -t "$ECR_REPO:latest" ./backend
          docker push "$ECR_REPO:$IMAGE_TAG"
          docker push "$ECR_REPO:latest"

      - name: Trigger rolling deploy via SSM
        env:
          INSTANCE_ID: ${{ vars.BACKEND_INSTANCE_ID }}
          IMAGE_TAG: ${{ github.sha }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy $IMAGE_TAG" \
            --parameters commands="sudo /usr/local/bin/deploy-backend.sh $IMAGE_TAG" \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CMD_ID"
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query "{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}" --output json

  # Build the frontend against the CDN API URL, sync to S3, invalidate CloudFront.
  frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - name: Build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync dist "s3://${{ vars.FRONTEND_BUCKET }}" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
